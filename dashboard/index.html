<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Saira:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <link rel="icon" href="assets/icon.png" type="image/png" />

    <title>Dashboard</title>

    <style>
      body {
        font-family: "Saira", sans-serif;
        background-color: #0f172a;
        overflow-x: hidden;
      }

      .sidebar {
        width: 260px;
        min-height: 100vh;
        background: #111827;
        border-right: 1px solid #1e293b;
      }

      .sidebar .nav-link {
        color: #cbd5e1;
        border-radius: 10px;
        padding: 12px 14px;
        transition: 0.2s;
      }

      .sidebar .nav-link:hover {
        background: #1e293b;
        color: white;
      }

      .sidebar .nav-link.active {
        background: #3b82f6;
        color: white;
      }

      .dashboard-content {
        flex: 1;
      }

      .topbar {
        background: #111827;
        border-bottom: 1px solid #1e293b;
      }

      .stats-card {
        background: #111827;
        border: 1px solid #1e293b;
        border-radius: 16px;
      }

      .job-card {
        background: #111827;
        border: 1px solid #1e293b;
        border-radius: 18px;
        transition: 0.2s;
      }

      .job-card:hover {
        transform: translateY(-2px);
        border-color: #3b82f6;
      }

      .job-tags span {
        font-size: 12px;
      }

      .job-meta {
        font-size: 13px;
        color: #94a3b8;
      }

      .section-title {
        font-size: 22px;
        font-weight: 700;
      }

      .sidebar-title {
        font-size: 20px;
        font-weight: 700;
      }

      .artifact-item {
        background: #0f172a;
        border: 1px solid #1e293b;
        border-radius: 12px;
      }

      .table-container {
        background: #111827;
        border-radius: 18px;
        border: 1px solid #1e293b;
      }

      .table td,
      .table th {
        background: transparent !important;
      }
    </style>
  </head>

  <body>
    <div class="d-flex">
      <div class="dashboard-content">
        <header class="topbar px-4 py-3">
          <div class="d-flex justify-content-between align-items-center">
            <div>
              <div class="fs-4 fw-bold">Dashboard</div>

              <small class="text-secondary">
                Monitor and manage your scraping jobs
              </small>
            </div>

            <div class="d-flex align-items-center gap-3">
              <form class="d-flex">
                <input
                  class="form-control"
                  type="search"
                  placeholder="Search jobs..."
                />
              </form>

              <button
                class="btn btn-primary"
                type="button"
                class="btn btn-primary"
                data-bs-toggle="modal"
                data-bs-target="#exampleModal"
              >
                <i class="bi bi-plus-lg me-1"></i>
                Nova execução
              </button>

              <!-- <button class="btn btn-outline-light">
                <i class="bi bi-bell"></i>
              </button> -->
            </div>
          </div>
        </header>

        <main class="p-4">
          <!-- <div class="row g-3 mb-4">
            <div class="col-md-3">
              <div class="stats-card p-3">
                <small class="text-secondary"> Running Jobs </small>

                <div class="fs-2 fw-bold text-info">12</div>
              </div>
            </div>

            <div class="col-md-3">
              <div class="stats-card p-3">
                <small class="text-secondary"> Completed Today </small>

                <div class="fs-2 fw-bold text-success">248</div>
              </div>
            </div>

            <div class="col-md-3">
              <div class="stats-card p-3">
                <small class="text-secondary"> Failed Jobs </small>

                <div class="fs-2 fw-bold text-danger">7</div>
              </div>
            </div>

            <div class="col-md-3">
              <div class="stats-card p-3">
                <small class="text-secondary"> Avg Runtime </small>

                <div class="fs-2 fw-bold text-warning">2m 14s</div>
              </div>
            </div>
          </div> -->

          <div class="row g-4">
            <div class="col-lg-4" id="job-list">
              <div class="job-card p-3 h-100">
                <div
                  class="d-flex justify-content-between align-items-start mb-3"
                >
                  <div>
                    <div class="fs-3 fw-bold">
                      Amazon GPU Scraping
                      <span class="text-muted" style="font-size: 10pt"
                        >1m55s</span
                      >
                    </div>

                    <div class="job-meta">Job #145</div>
                  </div>

                  <span class="badge bg-success"> Completed </span>
                </div>

                <p class="text-secondary">
                  Daily scraping pipeline for GPU prices and availability across
                  marketplaces.
                </p>

                <div class="job-tags d-flex gap-2 flex-wrap mb-3">
                  <span class="badge bg-primary"> amazon </span>

                  <span class="badge bg-secondary"> gpu </span>

                  <span class="badge bg-secondary"> hardware </span>
                </div>

                <div class="d-flex gap-2 mt-3 justify-content-end">
                  <button class="btn btn-primary">Details</button>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <!-- Modais -->
    <div
      class="modal fade"
      id="exampleModal"
      tabindex="-1"
      aria-labelledby="exampleModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="exampleModalLabel">
              Nova execução
            </h1>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <form action="/jobs/" method="post">
              <h3>Informações Básicas</h3>
              <div class="form-floating mb-3">
                <input
                  type="text"
                  class="form-control rounded-3"
                  id="floatingtitle"
                />
                <label for="floatingtitle">Titulo</label>
              </div>

              <div class="form-floating mb-3">
                <input
                  type="text"
                  class="form-control rounded-3"
                  id="floatingDescription"
                />
                <label for="floatingDescription">Descrição</label>
              </div>

              <div class="form-floating mb-3">
                <input
                  type="text"
                  class="form-control rounded-3"
                  id="floatingkeywords"
                />
                <label for="floatingkeywords">Palavra-Chaves (Tags)</label>
              </div>

              <hr />

              <h3>Configurações</h3>

              <div class="bg-dark-subtle w-100 rounded p-3">
                <div class="mb-3">
                  <h5 class="mb-0">Onde buscar?</h5>
                </div>

                <div class="d-flex flex-wrap justify-content-between gap-3">
                  <div class="form-check">
                    <input
                      type="checkbox"
                      class="form-check-input"
                      value=""
                      id="checkCaraguatatuba"
                    />
                    <label class="form-check-label" for="checkCaraguatatuba"
                      >Caraguatatuba</label
                    >
                  </div>
                  <div class="form-check">
                    <input
                      type="checkbox"
                      class="form-check-input"
                      value=""
                      id="checkUbatuba"
                    />
                    <label class="form-check-label" for="checkUbatuba"
                      >Ubatuba</label
                    >
                  </div>
                  <div class="form-check">
                    <input
                      type="checkbox"
                      class="form-check-input"
                      value=""
                      id="checkSaoSebastiao"
                    />
                    <label class="form-check-label" for="checkSaoSebastiao"
                      >São Sebastião</label
                    >
                  </div>
                </div>
              </div>
              <div class="mt-3 d-flex justify-content-end">
                <button
                  type="button"
                  class="btn btn-secondary me-3"
                  data-bs-dismiss="modal"
                >
                  Fechar
                </button>
                <button type="submit" class="btn btn-primary">
                  Criar execução
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script>
      function cardTemplate(
        title,
        elapsed_time,
        job_id,
        job_status,
        description,
        tags,
      ) {
        let ts = "".join(
          tags.forEach((tag) => `<span class="badge bg-primary">${tag}</span>`),
        );
        return `<div class="job-card p-3 h-100">
                <div
                  class="d-flex justify-content-between align-items-start mb-3"
                >
                  <div>
                    <div class="fs-3 fw-bold">
                      ${title}
                      <span class="text-muted" style="font-size: 10pt"
                        >${elapsed_time}</span
                      >
                    </div>

                    <div class="job-meta">Job #${job_id}</div>
                  </div>

                  <span class="badge bg-success">${job_status}</span>
                </div>

                <p class="text-secondary">
                  ${description}
                </p>

                <div class="job-tags d-flex gap-2 flex-wrap mb-3">
                  ${ts}
                </div>

                <div class="d-flex gap-2 mt-3 justify-content-end">
                  <button class="btn btn-primary">Details</button>
                </div>
              </div>`;
      }

      fetch("http://localhost:8000/jobs/")
        .then((response) => response.json())
        .then((data) => {
          data.foreach((d) => {
            document.getElementById("jobs").innerHTML += cardTemplate(
              d.title,
              d.elapsed_time,
              d.job_id,
              d.job_status,
              d.description,
              d.tags,
            );
          });
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
      integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
