<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />

        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />

        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

        <link
            href="https://fonts.googleapis.com/css2?family=Saira:wght@100..900&display=swap"
            rel="stylesheet"
        />

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />

        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
        />

        <link rel="icon" href="/static/logo.png" type="image/png" />

        <title>Argos | Dashboard</title>

        <style>
            :root {
                --bg: #f4f7fb;
                --surface: #ffffff;
                --surface-hover: #f8fbff;

                --primary: #0a2a66;
                --primary-light: #123d91;

                --text: #1a1f2b;
                --muted: #64748b;

                --border: #e7edf5;

                --success: #00c2a8;
                --success-hover: #00ab94;

                --info: #2563eb;
                --info-hover: #1d4ed8;

                --danger: #ef4444;
            }

            body {
                font-family: "Saira", sans-serif;
                background: var(--bg);
                color: var(--text);
                overflow-x: hidden;
            }

            .dashboard-content {
                min-height: 100vh;
            }

            .topbar {
                background: linear-gradient(
                    135deg,
                    var(--primary),
                    var(--primary-light)
                );

                border-bottom: 1px solid rgba(255, 255, 255, 0.08);

                box-shadow: 0 6px 24px rgba(10, 42, 102, 0.15);
            }

            .topbar-subtitle {
                color: rgba(255, 255, 255, 0.75);
            }

            .job-card {
                background: var(--surface);

                border: 1px solid var(--border);

                border-radius: 24px;

                transition:
                    transform 0.2s ease,
                    box-shadow 0.2s ease,
                    border-color 0.2s ease;

                box-shadow: 0 4px 18px rgba(15, 23, 42, 0.04);
            }

            .job-card:hover {
                transform: translateY(-4px);

                border-color: #bfdbfe;

                box-shadow: 0 14px 40px rgba(15, 23, 42, 0.08);

                background: var(--surface-hover);
            }

            .job-meta {
                font-size: 13px;
                color: var(--muted);
            }

            .job-description {
                color: var(--muted);
                line-height: 1.5;
            }

            .badge-status {
                border-radius: 999px;
                padding: 8px 12px;
                font-size: 12px;
                font-weight: 700;
                text-transform: capitalize;
            }

            .badge-processing {
                background: rgba(245, 158, 11, 0.12);
                color: #d97706;
            }

            .badge-completed {
                background: rgba(34, 197, 94, 0.12);
                color: #16a34a;
            }

            .badge-failed {
                background: rgba(239, 68, 68, 0.12);
                color: #dc2626;
            }

            .badge-created {
                background: rgba(100, 116, 139, 0.12);
                color: #64748b;
            }

            .site-badge {
                background: #dbeafe;
                color: #1d4ed8;
                border-radius: 999px;
                padding: 7px 12px;
                font-size: 12px;
                font-weight: 600;
            }

            .tag-badge {
                background: #ecfeff;
                color: #0f766e;
                border-radius: 999px;
                padding: 7px 12px;
                font-size: 12px;
                font-weight: 600;
            }

            .btn-primary {
                background: var(--primary-light);
                border-color: var(--primary-light);

                border-radius: 14px;

                font-weight: 700;

                padding: 11px 20px;
            }

            .btn-primary:hover {
                background: var(--primary);
                border-color: var(--primary);
            }

            .btn-action {
                border-radius: 14px !important;

                font-weight: 700;

                border: none !important;

                padding: 12px 16px;

                transition:
                    transform 0.15s ease,
                    opacity 0.15s ease;
            }

            .btn-action:hover {
                transform: translateY(-1px);
                opacity: 0.95;
            }

            .btn-excel {
                background: var(--success);
                color: white;
            }

            .btn-excel:hover {
                background: var(--success-hover);
                color: white;
            }

            .btn-json {
                background: var(--info);
                color: white;
            }

            .btn-json:hover {
                background: var(--info-hover);
                color: white;
            }

            .modal-content {
                border: none;

                border-radius: 28px;

                background: white;

                box-shadow: 0 24px 80px rgba(15, 23, 42, 0.18);
            }

            .form-control {
                border-radius: 14px;

                border: 1px solid #dbe3ee;

                padding: 14px 16px;
            }

            .form-control:focus {
                border-color: #93c5fd;

                box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
            }

            .form-check-input {
                border-radius: 6px;
            }

            .accordion-item {
                border: none !important;
                background: transparent;
            }

            .accordion-button {
                border-radius: 16px !important;

                background: #f8fafc;

                color: var(--text);

                font-weight: 700;

                box-shadow: none !important;
            }

            .accordion-button:not(.collapsed) {
                background: #dbeafe;
                color: var(--primary);
            }

            .accordion-body {
                background: white;

                border: 1px solid var(--border);

                border-radius: 0 0 16px 16px;
            }

            .section-label {
                font-size: 13px;
                font-weight: 700;
                color: var(--muted);
                margin-bottom: 8px;
                display: block;
            }

            .job-actions {
                display: grid;
                gap: 10px;
                margin-top: 20px;
            }

            .alert-update {
                border: none;
                border-radius: 0;
                background: #fef3c7;
                color: #92400e;
            }
        </style>
    </head>

    <body>
        <div class="dashboard-content">
            <header class="topbar px-4 py-4">
                <div class="d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center gap-3">
                        <img
                            src="/static/logo-extended.png"
                            alt="Argos"
                            class="rounded-4"
                            style="height: 3.2rem"
                        />

                        <div>
                            <div class="fw-semibold text-white fs-5">
                                Observabilidade documental
                            </div>

                            <small class="topbar-subtitle">
                                Monitoramento e scraping inteligente
                            </small>
                        </div>
                    </div>

                    <button
                        class="btn btn-primary"
                        type="button"
                        data-bs-toggle="modal"
                        data-bs-target="#createJobModal"
                    >
                        <i class="bi bi-plus-lg me-1"></i>
                        Nova execução
                    </button>
                </div>
            </header>

            <main class="p-4">
                <div class="row g-4" id="job-list"></div>
            </main>
        </div>

        <div
            class="modal fade"
            id="createJobModal"
            tabindex="-1"
            aria-hidden="true"
        >
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header border-0 pb-0">
                        <h1 class="modal-title fs-4 fw-bold">Nova execução</h1>

                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"
                        ></button>
                    </div>

                    <div class="modal-body pt-2">
                        <form id="create-job-form">
                            <div class="form-floating mb-4">
                                <input
                                    type="text"
                                    class="form-control"
                                    id="title"
                                    name="title"
                                    placeholder="Pesquisa"
                                    required
                                />

                                <label for="title"> Termo de pesquisa </label>
                            </div>

                            <div class="form-floating mb-4">
                                <input
                                    type="text"
                                    class="form-control"
                                    id="description"
                                    name="description"
                                    placeholder="Descrição"
                                />

                                <label for="description"> Descrição </label>
                            </div>

                            <div class="form-floating mb-4">
                                <input
                                    type="text"
                                    class="form-control"
                                    id="tags"
                                    name="tags"
                                    placeholder="Tags"
                                />

                                <label for="tags">
                                    Tags separadas por vírgula
                                </label>
                            </div>

                            <h5 class="fw-bold mb-3">Parâmetros</h5>

                            <div class="mb-3">
                                <label
                                    for="profundidade"
                                    class="form-label fw-semibold"
                                >
                                    Profundidade da pesquisa
                                </label>

                                <input
                                    class="form-control"
                                    type="number"
                                    value="3"
                                    min="1"
                                    name="profundidade"
                                />
                            </div>

                            <div class="form-check mb-4">
                                <input
                                    name="todas"
                                    class="form-check-input"
                                    type="checkbox"
                                    id="todas"
                                />

                                <label for="todas" class="form-check-label">
                                    Pegar todas as páginas
                                </label>
                            </div>

                            <h5 class="fw-bold mb-3">Buscar em</h5>

                            <div class="accordion" id="accordionExample">
                                <div class="accordion-item mb-3">
                                    <h2 class="accordion-header">
                                        <button
                                            class="accordion-button"
                                            type="button"
                                            data-bs-toggle="collapse"
                                            data-bs-target="#collapseOne"
                                        >
                                            Notícias
                                        </button>
                                    </h2>

                                    <div
                                        id="collapseOne"
                                        class="accordion-collapse collapse show"
                                    >
                                        <div class="accordion-body">
                                            <div class="d-flex flex-wrap gap-3">
                                                <div class="form-check">
                                                    <input
                                                        type="checkbox"
                                                        class="form-check-input"
                                                        value="caraguatatuba"
                                                        id="checkCaraguatatuba"
                                                        name="sites"
                                                    />

                                                    <label
                                                        class="form-check-label"
                                                        for="checkCaraguatatuba"
                                                    >
                                                        Caraguatatuba
                                                    </label>
                                                </div>

                                                <div class="form-check">
                                                    <input
                                                        type="checkbox"
                                                        class="form-check-input"
                                                        value="ubatuba"
                                                        id="checkUbatuba"
                                                        name="sites"
                                                    />

                                                    <label
                                                        class="form-check-label"
                                                        for="checkUbatuba"
                                                    >
                                                        Ubatuba
                                                    </label>
                                                </div>

                                                <div class="form-check">
                                                    <input
                                                        type="checkbox"
                                                        class="form-check-input"
                                                        value="saosebastiao"
                                                        id="checkSaoSebastiao"
                                                        name="sites"
                                                    />

                                                    <label
                                                        class="form-check-label"
                                                        for="checkSaoSebastiao"
                                                    >
                                                        São Sebastião
                                                    </label>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div class="accordion-item">
                                    <h2 class="accordion-header">
                                        <button
                                            class="accordion-button collapsed"
                                            type="button"
                                            data-bs-toggle="collapse"
                                            data-bs-target="#collapseTwo"
                                        >
                                            Artigos Científicos
                                        </button>
                                    </h2>

                                    <div
                                        id="collapseTwo"
                                        class="accordion-collapse collapse"
                                    >
                                        <div class="accordion-body">
                                            <div class="form-check">
                                                <input
                                                    type="checkbox"
                                                    class="form-check-input"
                                                    value="periodicoscapes"
                                                    id="checkPeriodicosCapes"
                                                    name="sites"
                                                />

                                                <label
                                                    class="form-check-label"
                                                    for="checkPeriodicosCapes"
                                                >
                                                    Periódicos Capes
                                                </label>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="mt-4 d-flex justify-content-end gap-2">
                                <button
                                    type="button"
                                    class="btn btn-light"
                                    data-bs-dismiss="modal"
                                >
                                    Fechar
                                </button>

                                <button type="submit" class="btn btn-primary">
                                    Criar execução
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const UPDATE_CHECK_KEY = "last_update_check";

            const ONE_DAY_MS = 24 * 60 * 60 * 1000;

            function getStatusClass(status) {
                const map = {
                    completed: "badge-completed",
                    failed: "badge-failed",
                    processing: "badge-processing",
                    created: "badge-created",
                };

                return map[status] || "badge-created";
            }

            const todasCheckbox = document.querySelector("input[name='todas']");

            const profundidadeInput = document.querySelector(
                "input[name='profundidade']",
            );

            todasCheckbox.addEventListener("change", () => {
                profundidadeInput.disabled = todasCheckbox.checked;

                profundidadeInput.placeholder = todasCheckbox.checked
                    ? "Infinito"
                    : "";
            });

            function cardTemplate(job) {
                const sites = (job.parameters?.sites || [])
                    .map(
                        (site) => `
                            <span class="site-badge">
                                ${site}
                            </span>
                        `,
                    )
                    .join("");

                const tags = (job.tags?.split(",") || [])
                    .filter((tag) => tag.trim() !== "")
                    .map(
                        (tag) => `
                            <span class="tag-badge">
                                ${tag.trim()}
                            </span>
                        `,
                    )
                    .join("");

                const resultsCount = job.data?.length || 0;

                const errorHtml = job.error
                    ? `
                        <div class="mt-3 text-danger fw-semibold">
                            ${job.error}
                        </div>
                    `
                    : "";

                const actions =
                    job.status === "completed" && resultsCount > 0
                        ? `
                            <div class="job-actions">

                                <button
                                    class="btn btn-action btn-excel"
                                    onclick="downloadExcel('${job.job_hash}')"
                                >
                                    <i class="bi bi-filetype-xlsx me-2"></i>
                                    Baixar resultados
                                </button>

                                <button
                                    class="btn btn-action btn-json"
                                    onclick="downloadJson('${job.job_hash}')"
                                >
                                    <i class="bi bi-filetype-json me-2"></i>
                                    Exportar configuração
                                </button>

                            </div>
                        `
                        : "";

                return `
                    <div class="col-lg-4">

                        <div class="job-card p-4 h-100">

                            <div class="d-flex justify-content-between align-items-start mb-4">

                                <div>

                                    <div class="fs-5 fw-bold mb-1">
                                        ${job.title}
                                    </div>

                                    <div class="job-meta">
                                        Job #${job.job_id} • ${job.date}
                                    </div>

                                    ${
                                        job.description
                                            ? `
                                                <div class="job-description mt-3">
                                                    ${job.description}
                                                </div>
                                            `
                                            : ""
                                    }

                                </div>

                                <span class="badge-status ${getStatusClass(job.status)}">
                                    ${job.status}
                                </span>

                            </div>

                            ${
                                tags
                                    ? `
                                        <div class="mb-4">

                                            <span class="section-label">
                                                TAGS
                                            </span>

                                            <div class="d-flex flex-wrap gap-2">
                                                ${tags}
                                            </div>

                                        </div>
                                    `
                                    : ""
                            }



                            <div>

                                <span class="section-label">
                                    FONTES
                                </span>

                                <div class="d-flex flex-wrap gap-2">
                                    ${sites}
                                </div>

                            </div>

                            <div class="mt-4">

                                <span class="section-label">
                                    RESULTADOS
                                </span>

                                <div class="fw-semibold fs-5">
                                    ${resultsCount}
                                </div>

                            </div>

                            ${errorHtml}

                            ${actions}

                        </div>

                    </div>
                `;
            }

            async function downloadExcel(jobHash) {
                const response = await fetch(`/jobs/${jobHash}`);

                if (!response.ok) {
                    alert("Erro ao carregar job");
                    return;
                }

                const job = await response.json();

                if (!job.data || job.data.length === 0) {
                    alert("Nenhum dado encontrado");
                    return;
                }

                const rows = job.data.map((item) => ({
                    Titulo: item.titulo,
                    Data: item.data,
                    Ano: item.ano,
                    Origem: item.origem,
                    Link: item.link,
                    Resumo: item.resumo,
                }));

                const worksheet = XLSX.utils.json_to_sheet(rows);

                const workbook = XLSX.utils.book_new();

                XLSX.utils.book_append_sheet(workbook, worksheet, "Resultados");

                XLSX.writeFile(workbook, `job_${job.id}.xlsx`);
            }

            async function downloadJson(jobHash) {
                const response = await fetch(`/jobs/${jobHash}/export`);

                if (!response.ok) {
                    alert("Erro ao exportar execução");
                    return;
                }

                const job = await response.json();

                const jsonString = JSON.stringify(job, null, 2);

                const blob = new Blob([jsonString], {
                    type: "application/json",
                });

                const url = URL.createObjectURL(blob);

                const a = document.createElement("a");

                a.href = url;

                a.download = `execucao_${jobHash}.json`;

                document.body.appendChild(a);

                a.click();

                a.remove();

                URL.revokeObjectURL(url);
            }

            async function loadJobs() {
                try {
                    const response = await fetch("/jobs/");

                    if (!response.ok) {
                        return;
                    }

                    const jobs = await response.json();

                    const container = document.getElementById("job-list");

                    container.innerHTML = "";

                    jobs.sort((a, b) => b.id - a.id).forEach((job) => {
                        container.insertAdjacentHTML(
                            "beforeend",
                            cardTemplate(job),
                        );
                    });
                } catch (err) {
                    console.error(err);
                }
            }

            document
                .getElementById("create-job-form")
                .addEventListener("submit", async (e) => {
                    e.preventDefault();

                    const title = document.getElementById("title").value;

                    const description =
                        document.querySelector("input[name='description']")
                            .value || "";

                    const tags =
                        document.querySelector("input[name='tags']").value ||
                        "";

                    const sites = [
                        ...document.querySelectorAll(
                            'input[name="sites"]:checked',
                        ),
                    ].map((el) => el.value);

                    const profundidade = Number(
                        document.querySelector("input[name='profundidade']")
                            .value,
                    );

                    const todas = document.querySelector(
                        "input[name='todas']",
                    ).checked;

                    const response = await fetch("/jobs/", {
                        method: "POST",

                        headers: {
                            "Content-Type": "application/json",
                        },

                        body: JSON.stringify({
                            title,
                            description,
                            tags,
                            sites,
                            profundidade: todas ? 9999 : profundidade,
                        }),
                    });

                    if (!response.ok) {
                        alert("Erro ao criar job");
                        return;
                    }

                    document.getElementById("create-job-form").reset();

                    profundidadeInput.disabled = false;

                    const modal = bootstrap.Modal.getInstance(
                        document.getElementById("createJobModal"),
                    );

                    modal.hide();

                    await loadJobs();
                });

            async function checkForUpdates() {
                try {
                    const lastCheck = localStorage.getItem(UPDATE_CHECK_KEY);

                    if (lastCheck) {
                        const diff = Date.now() - Number(lastCheck);

                        if (diff < ONE_DAY_MS) {
                            return;
                        }
                    }

                    localStorage.setItem(
                        UPDATE_CHECK_KEY,
                        Date.now().toString(),
                    );

                    const localResponse = await fetch("/version/");

                    const localData = await localResponse.json();

                    const githubResponse = await fetch(
                        "https://api.github.com/repos/SEU_USUARIO/SEU_REPO/releases/latest",
                    );

                    const githubData = await githubResponse.json();

                    const localVersion = localData.version;

                    const remoteVersion = githubData.tag_name.replace("v", "");

                    if (compareVersions(remoteVersion, localVersion) > 0) {
                        showUpdateBanner(remoteVersion);
                    }
                } catch (err) {
                    console.error(err);
                }
            }

            function compareVersions(a, b) {
                const pa = a.split(".").map(Number);

                const pb = b.split(".").map(Number);

                for (let i = 0; i < 3; i++) {
                    if (pa[i] > pb[i]) return 1;

                    if (pa[i] < pb[i]) return -1;
                }

                return 0;
            }

            function showUpdateBanner(version) {
                const html = `
                    <div
                        class="alert alert-update text-center m-0"
                        role="alert"
                    >
                        Nova versão disponível:
                        <strong>${version}</strong>

                        <a
                            href="https://github.com/SEU_USUARIO/SEU_REPO/releases/latest"
                            target="_blank"
                            class="btn btn-dark btn-sm ms-3"
                        >
                            Atualizar
                        </a>
                    </div>
                `;

                document.body.insertAdjacentHTML("afterbegin", html);
            }

            loadJobs();

            setInterval(loadJobs, 2000);

            checkForUpdates();
        </script>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

        <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    </body>
</html>
